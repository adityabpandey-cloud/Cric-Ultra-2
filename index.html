<!DOCTYPE html>
<html>
<head>
    <title>CRIC-ULTRA 26 | 3D VIEW</title>
    <style>
        body { margin: 0; background: #000b1e; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; perspective: 1000px; }
        #ui { position: absolute; top: 20px; color: #00d2ff; text-align: center; z-index: 100; text-shadow: 0 0 10px #00d2ff; }
        #stadium { width: 500px; height: 500px; background: radial-gradient(#2e7d32, #1b5e20); border: 8px solid #fff; border-radius: 50%; transform: rotateX(60deg); position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 50px 100px rgba(0,0,0,0.5); }
        #pitch { width: 70px; height: 300px; background: #d2b48c; border-left: 2px solid rgba(255,255,255,0.5); border-right: 2px solid rgba(255,255,255,0.5); position: absolute; }
        #player { width: 20px; height: 50px; background: #00d2ff; border-radius: 5px; position: absolute; bottom: 40px; transform: rotateX(-60deg) translateY(-25px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); animation: run 2s infinite alternate; }
        @keyframes run { from { left: 40%; } to { left: 60%; } }
    </style>
</head>
<body>
    <div id="ui"><h1>🏏 CRIC-ULTRA 26</h1><p>3D STADIUM ENGINE ONLINE</p></div>
    <div id="stadium"><div id="pitch"></div><div id="player"></div></div>
</body>
</html>
