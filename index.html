<!DOCTYPE html>
<html>
<head>
    <title>CRIC-ULTRA 26 | 3D ENGINE</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #00d2ff; font-family: Arial; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>🏏 CRIC-ULTRA 26</h1>
        <p>3D STADIUM ENGINE INITIALIZED | FPS: 60</p>
    </div>
    <script>
        // 3D Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Green Grass Pitch (Maidan)
        const geometry = new THREE.PlaneGeometry(100, 100);
        const material = new THREE.MeshBasicMaterial({ color: 0x113300, side: THREE.DoubleSide });
        const ground = new THREE.Mesh(geometry, material);
        ground.rotation.x = Math.PI / 2;
        scene.add(ground);

        // Player Placeholder (3D Humanoid Body)
        const playerGeo = new THREE.BoxGeometry(1, 2, 1);
        const playerMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 1;
        scene.add(player);

        camera.position.z = 10;
        camera.position.y = 5;
        camera.lookAt(0,0,0);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
