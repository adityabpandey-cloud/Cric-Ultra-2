<<!DOCTYPE html>
<html>
<head>
    <title>CRIC-ULTRA 26 | 3D CINEMATIC</title>
    <style>
        body { margin: 0; background: #000b1e; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; perspective: 1000px; }
        #ui { position: absolute; top: 20px; color: #00d2ff; text-align: center; z-index: 100; text-shadow: 0 0 10px #00d2ff; }
        
        /* 3D Stadium (Leta hua Maidan) */
        #stadium { 
            width: 600px; height: 600px; background: radial-gradient(#2e7d32, #1b5e20); 
            border: 10px solid #fff; border-radius: 50%; 
            transform: rotateX(60deg); 
            position: relative; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        /* 3D Pitch */
        #pitch { 
            width: 80px; height: 350px; background: #d2b48c; 
            border-left: 3px solid rgba(255,255,255,0.5); border-right: 3px solid rgba(255,255,255,0.5); 
            position: absolute; box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        /* 3D Player (Khada hua) */
        #player { 
            width: 25px; height: 60px; background: linear-gradient(#00d2ff, #005f73); 
            border-radius: 5px; position: absolute; bottom: 50px; 
            transform: rotateX(-60deg) translateY(-30px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: movePlayer 3s infinite alternate;
        }

        @keyframes movePlayer { from { left: 40%; } to { left: 60%; } }
    </style>
</head>
<body>
    <div id="ui">
        <h1>🏏 CRIC-ULTRA 26</h1>
        <p>WANKHEDE: 3D PERSPECTIVE ACTIVE</p>
    </div>
    <div id="stadium">
        <div id="pitch"></div>
        <div id="player"></div>
    </div>
</body>
</html>
