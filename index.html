<!DOCTYPE html>
<html>
<head>
    <title>CRIC-ULTRA 26 | PRO VIEW</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
   #ui { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #00d2ff; font-family: 'Arial Black', sans-serif; z-index: 10; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>
    <div id="ui"><h1>🏏 CRIC-ULTRA 26</h1><p>WANKHEDE STADIUM | LIGHTS ON! ✨</p></div>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000b1e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. LIGHTS (As per your Green Appeal)
        const light = new THREE.AmbientLight(0xffffff, 1.2); 
        scene.add(light);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7.5);
        scene.add(sun);

        // 2. GROUND & PITCH
        const ground = new THREE.Mesh(new THREE.CircleGeometry(20, 64), new THREE.MeshStandardMaterial({ color: 0x1b5e20 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const pitch = new THREE.Mesh(new THREE.PlaneGeometry(4, 15), new THREE.MeshStandardMaterial({ color: 0xc19a6b }));
        pitch.rotation.x = -Math.PI / 2;
        pitch.position.y = 0.05;
        scene.add(pitch);

        // 3. PLAYER (As per your Green Appeal)
        const player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.2), new THREE.MeshStandardMaterial({ color: 0x00d2ff }));
        const bat = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.4, 0.1), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
        bat.position.set(0.6, 0, 0.5);
        bat.rotation.z = -0.3;
        player.add(body); player.add(bat);
        player.position.y = 1.2;
        scene.add(player);

        // 4. CAMERA (12 units - As per your Green Appeal)
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 1, 0);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
