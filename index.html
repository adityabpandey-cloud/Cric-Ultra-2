<!DOCTYPE html>
<html>
<head>
    <title>CRIC-ULTRA 26 | 360 3D VIEW</title>
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000b1e; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #00d2ff; font-family: sans-serif; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui"><h1>🏏 CRIC-ULTRA 26</h1><p>360° VIEW ACTIVE: DRAG TO ROTATE</p></div>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000b1e);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(light);

        // 3D Stadium & Pitch
        const groundGeo = new THREE.CircleGeometry(20, 64);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const pitchGeo = new THREE.PlaneGeometry(4, 15);
        const pitchMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c });
        const pitch = new THREE.Mesh(pitchGeo, pitchMat);
        pitch.rotation.x = -Math.PI / 2;
        pitch.position.y = 0.01;
        scene.add(pitch);

        // 3D Player Body
        const pGeo = new THREE.CapsuleGeometry(0.4, 1, 4, 8);
        const pMat = new THREE.MeshStandardMaterial({ color: 0x00d2ff });
        const player = new THREE.Mesh(pGeo, pMat);
        player.position.y = 1;
        scene.add(player);

        camera.position.set(0, 10, 20);
        
        // --- 360° Controls ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
