<!DOCTYPE html>
<html>
<head>
    <title>CRIC-ULTRA 26 | 3D VIEW</title>
    <!-- Hum Three.js ka naya aur fast link use kar rahe hain -->
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000b1e; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #00d2ff; font-family: sans-serif; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>🏏 CRIC-ULTRA 26</h1>
        <p>STADIUM: WANKHEDE | LOADING 3D ASSETS...</p>
    </div>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000b1e);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(light);

        // Hara Maidan (Basic Circle)
        const geometry = new THREE.CircleGeometry(10, 32);
        const material = new THREE.MeshBasicMaterial({ color: 0x228B22 }); // Pure Green
        const ground = new THREE.Mesh(geometry, material);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Player (Blue Cube)
        const pGeo = new THREE.BoxGeometry(1, 2, 1);
        const pMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff });
        const player = new THREE.Mesh(pGeo, pMat);
        player.position.y = 1;
        scene.add(player);

        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);
            player.rotation.y += 0.02;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
